# 文章立意模板 (Article Concept)
# 用途：在动笔前明确文章的核心论点、结构和数据支撑
# 适用：技术博客、平台对比、迁移指南等所有内容类型

# ============================================
# 基本信息
# ============================================
title: "文章标题"
type: "blog | comparison | tutorial | social | changelog"
target_platforms:
  - "官网博客"
  - "知乎"
  - "掘金"

# ============================================
# 核心论点（Thesis）
# ============================================
# 一句话回答「读完后读者记住什么」
thesis: >
  用 {产品} {动作}，{结果}。

# 检验标准：
# 1. 删掉所有数据和案例，只留论点，论点本身是否有价值？
# 2. 目标读者是否已经在别处看过类似内容？增量是什么？
# 3. 读者看完会采取什么行动？

# ============================================
# SEO 关键词
# ============================================
seo_keywords:
  - "核心关键词 1"
  - "核心关键词 2"
  - "长尾关键词"

# ============================================
# 目标读者
# ============================================
audience: >
  独立开发者、AI 应用创业者、
  正在寻找更便宜 API 方案的技术团队

# ============================================
# 读者行动
# ============================================
# 看完后希望读者做什么
desired_action: "注册产品并迁移现有项目"

# ============================================
# 开篇方式
# ============================================
opening:
  type: "数据冲击 | 痛点切入 | 案例开篇 | 反直觉发现"
  content: >
    具体的开篇内容（必须可核实，禁止虚构）
    例：「2025年12月，OpenAI 将 GPT-4o 价格下调 50%，
    但对于月调用量超过 100 万 token 的开发者来说，
    这仍然意味着每月 $XXX 的支出。」

# ============================================
# 文章结构
# ============================================
sections:
  - title: "第一节标题"
    keyPoint: >
      本节要证明什么（判断句，不是描述句）
      例如：「LemonData 的价格比 OpenRouter 低 30%」
      而不是：「介绍 LemonData 的价格」
    evidence:
      - "支撑数据 1（含来源和日期）"
      - "支撑数据 2（含来源和日期）"
    word_count: 300

  - title: "第二节标题"
    keyPoint: >
      本节判断
    evidence:
      - "支撑数据"
    code_example: true  # 是否需要代码示例
    word_count: 400

  - title: "第三节标题"
    keyPoint: >
      本节判断
    evidence:
      - "支撑数据"
    screenshot: true    # 是否需要截图
    word_count: 350

# ============================================
# 数据点（Data Points）
# ============================================
# 所有文章中使用的数据，必须可验证
dataPoints:
  - fact: "具体数据（含数字、时间、主体）"
    source: "来源机构和时间"
    source_url: "https://source.com"
    verified: true  # 是否已验证
    date: "2026-03-02"  # 数据获取日期
    notes: "补充说明"

  - fact: "另一个数据点"
    source: "内部数据"
    verified: true
    date: "2026-03-01"

# ============================================
# 竞品对比（如果适用）
# ============================================
competitor_comparison:
  enabled: true
  competitors:
    - name: "Competitor A"
      data_points:
        - metric: "价格"
          value: "$X/月"
          source: "官网"
        - metric: "模型数"
          value: "100+"
          source: "官网"

    - name: "Competitor B"
      data_points:
        - metric: "价格"
          value: "$Y/月"
          source: "官网"

  comparison_dimensions:
    - "价格"
    - "支持的模型数"
    - "API 兼容性"
    - "文档质量"

# ============================================
# CTA（Call-to-Action）
# ============================================
cta:
  text: "立即注册，新用户赠送 $1 体验额度"
  url: "https://yourproduct.com"
  placement: "文末 + 每个主要章节后（可选）"

# ============================================
# 预估字数
# ============================================
wordCount: 2000

# ============================================
# 内容标记提示
# ============================================
# 写作时需要标记的内容，用于后续多渠道分发
markers_needed:
  - HOOK          # 开篇钩子
  - KEY_POINT     # 核心卖点
  - CODE          # 代码示例
  - DATA          # 数据表格
  - CTA           # 行动号召
  - SCREENSHOT    # 需要截图的位置
  - QUOTE         # 用户引用

# ============================================
# 声音和风格
# ============================================
voice:
  tone: "技术老手的实话实说"
  style: "数据驱动，不吹不黑"
  avoid:
    - "营销腔"
    - "AI 套话"
    - "空洞承诺"

# ============================================
# 质量目标
# ============================================
quality_targets:
  readability: "开发者能快速理解"
  evidence: "每个判断都有数据支撑"
  actionability: "读者看完知道下一步做什么"
  uniqueness: "提供别处看不到的增量信息"

# ============================================
# 审阅检查点
# ============================================
review_checkpoints:
  - "Thesis 是否清晰？一句话能说清吗？"
  - "每个 section 的 keyPoint 是否服务于 Thesis？"
  - "所有数据是否已验证？是否标注来源和日期？"
  - "是否有足够的证据支撑核心论点？"
  - "读者看完会采取行动吗？"
  - "是否避免了所有 AI 套话和营销腔？"

# ============================================
# 相关资源
# ============================================
resources:
  research:
    - "竞品分析文档"
    - "用户调研结果"
  references:
    - "参考文章 1"
    - "参考文章 2"
  assets:
    - "封面图设计稿"
    - "数据表格"
