faq:
  - question: What is the cheapest OpenRouter alternative?
    answer_hint: >-
      Crazyrouter offers 30-50% savings vs official pricing, while LiteLLM is free but requires self-hosting costs.
      Compare total cost including ops overhead.
  - question: Can I use the same code when switching from OpenRouter?
    answer_hint: >-
      Yes for OpenAI-compatible alternatives (just change base URL). Multi-protocol gateways require endpoint changes
      but preserve more native features.
  - question: Which OpenRouter alternative supports Anthropic prompt caching?
    answer_hint: >-
      Crazyrouter preserves native Anthropic caching semantics via /v1/messages endpoint. OpenAI-compatible layers
      typically lose this feature.
  - question: Do any OpenRouter alternatives accept CNY payment?
    answer_hint: >-
      Crazyrouter supports WeChat Pay and Alipay for Chinese developers. Most alternatives only accept credit cards or
      crypto.
  - question: Is LiteLLM better than OpenRouter for self-hosting?
    answer_hint: >-
      LiteLLM is the only true self-hosted option among alternatives, giving full data control. OpenRouter is
      managed-only.
  - question: Which alternative has the best error handling for AI agents?
    answer_hint: >-
      Crazyrouter offers 48 structured error codes with did_you_mean suggestions and retryable flags, designed for agent
      retry logic.
  - question: Can I migrate from OpenRouter without downtime?
    answer_hint: Yes, use feature flags or environment variables to gradually shift traffic. Test with small percentage first.
  - question: Which OpenRouter alternative is best for enterprises?
    answer_hint: >-
      Portkey for observability, Kong for existing Kong users, LiteLLM for data sovereignty. Depends on primary
      requirement.
